name: NEXUS Production Deployment CI/CD

on:
  push:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (Client Build)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'

      - name: Install client dependencies
        run: |
          cd client
          npm ci

      - name: Run client tests
        run: |
          cd client
          npm test

      - name: Build static frontend (client)
        env:
          VITE_API_URL: https://api.saarlabs.in
          VITE_APP_NAME: NEXUS
        run: |
          cd client
          npm run build

      - name: Setup Bun (Server Environment)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install server dependencies
        run: |
          cd server
          bun install --frozen-lockfile

      - name: Run server tests
        env:
          DB_URL: ${{ secrets.DB_URL }}
        run: |
          cd server
          bun test

      - name: Upload static build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-client
          path: client/dist/

  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Copy Files to Remote VPS
        run: |
          # Create target directories
          ssh ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "mkdir -p /var/www/saarlabs.in"
          
          # Sync client source code (exclude node_modules and target builds)
          rsync -avz --delete --exclude 'node_modules' --exclude 'dist' client/ ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/var/www/saarlabs.in/client/
          
          # Sync server source code (exclude node_modules, local DB, and environments)
          rsync -avz --delete --exclude 'node_modules' --exclude '.env' --exclude 'nexus_memory.sqlite' server/ ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/var/www/saarlabs.in/server/
          
          # Sync docker-compose coordinates
          rsync -avz docker-compose.yml ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/var/www/saarlabs.in/

      - name: Start Docker Services on Remote VPS
        run: |
          ssh ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "
            cd /var/www/saarlabs.in
            
            # Write server .env using the combined SERVER_ENV secret
            cd server
            echo '${{ secrets.SERVER_ENV }}' > .env
            echo 'PORT=6000' >> .env
            echo 'NODE_ENV=production' >> .env
            
            # Deploy containers via Docker Compose
            cd /var/www/saarlabs.in
            docker compose down --remove-orphans
            docker compose up --build -d
          "

